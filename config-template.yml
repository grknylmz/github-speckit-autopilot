# Spec Kit Autopilot Configuration
# Copy this to autopilot-config.yml and customize as needed.
# Location: .specify/extensions/autopilot/autopilot-config.yml

# ─── Test Enforcement ─────────────────────────────────────────────
# These settings control how tests are enforced in generated tasks.
# In autopilot mode, test enforcement is always active.

test_enforcement:
  # Generate unit test tasks for every implementation task
  unit_tests: true

  # Generate integration test tasks for integration points
  integration_tests: true

  # Apply test requirements to ALL tasks (not just critical ones)
  enforce_for_all_tasks: true

  # Test framework — set to auto-detect or specify explicitly
  # Options: auto-detect, jest, vitest, pytest, junit, go-test, xunit, rspec, minitest
  test_framework: "auto-detect"

  # Minimum test coverage target (percentage) — enforced in final phase
  coverage_target: 80

# ─── Self-Validation ──────────────────────────────────────────────
# Every feature built through autopilot MUST include self-validation
# that the system can execute to confirm it works without human input.

self_validation:
  # Enable self-validation task generation (always true in autopilot)
  enabled: true

  # Validation techniques to include in generated tasks.
  # The most appropriate technique is chosen per task automatically.
  # Remove techniques you don't want used.
  techniques:
    - logging           # Log structured output; autopilot checks log contents
    - smoke             # Quick runtime check (curl, health endpoint, etc.)
    - assertion         # Runtime assertions in code (assert(), expect(), etc.)
    - build             # Build/typecheck/lint passes with zero errors
    - schema            # Schema/file validation (prisma validate, JSON schema, etc.)
    - health            # Health/readiness endpoint returns expected payload
    - dry-run           # --dry-run flag outputs what would happen
    - idempotency       # Run twice, verify identical output/state
    - contract          # Response matches expected JSON/protobuf schema
    - snapshot          # Output compared against golden snapshot

  # Generate a validation-results.log in the feature directory
  # when self-validation tasks are executed
  log_results: true

# ─── Clarification Behavior ────────────────────────────────────────
# Controls how the autopilot handles spec clarification.

clarify:
  # Auto-answer all clarification questions using AI-recommended options
  # Set to false to present questions to the user interactively
  auto_answer: true

  # Use the recommended (best-practice) option for each question
  use_recommended: true

  # Maximum clarification questions to process (0-5)
  # Remaining ambiguities are resolved with informed guesses
  max_auto_questions: 5

# ─── Pipeline Configuration ────────────────────────────────────────
# Controls which phases run and how the pipeline behaves.

pipeline:
  # Stop the entire pipeline if any phase fails
  # Set to false to attempt to continue past failures
  stop_on_failure: true

  # Log detailed progress for each phase (phase start/end, artifact counts)
  verbose_logging: true

  # Ordered list of phases to execute.
  # Remove phases to skip them. Common configurations:
  #   Full pipeline:       [specify, clarify, plan, tasks]
  #   Skip clarify:        [specify, plan, tasks]
  #   Only plan + tasks:   [plan, tasks]
  #   Only tasks:          [tasks]
  phases:
    - specify
    - clarify
    - plan
    - tasks

  # Automatically chain into /speckit.implement after tasks are generated
  # WARNING: This can be expensive and hard to interrupt
  chain_implement: false
